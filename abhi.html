<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  color:#fff;
}

h2{
  text-align:center;
  margin:20px;
}

.container{
  width:95%;
  margin:auto;
  background:#ffffff;
  border-radius:12px;
  padding:20px;
  color:#000;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

table{
  width:100%;
  border-collapse: collapse;
}

th{
  background:#2a5298;
  color:white;
  padding:12px;
}

td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

tr:hover{
  background:#f5f5f5;
}

img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:8px;
}

button{
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.delete-btn{
  background:#ff4d4d;
  color:white;
}

.delete-btn:hover{
  background:#cc0000;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.total{
  font-weight:bold;
  color:#2a5298;
}

</style>

</head>

<body>

<h2>📊 Smart Attendance Admin Panel</h2>

<div class="container">

  <div class="header">
    <div class="total">Total Records: <span id="count">0</span></div>
  </div>

  <table id="table">
    <tr>
      <th>Dept</th>
      <th>Year</th>
      <th>Name</th>
      <th>Roll</th>
      <th>Lecture</th>
      <th>Photo</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  </table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "smart-attendence-3167b.firebaseapp.com",
  projectId: "smart-attendence-3167b",
  storageBucket: "smart-attendence-3167b.appspot.com",
  messagingSenderId: "894029161535",
  appId: "1:894029161535:web:3e0749629d7389dc85048a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const table = document.getElementById("table");
const count = document.getElementById("count");

let total = 0;

// LOAD DATA
async function loadData() {
  const snapshot = await getDocs(collection(db, "attendance"));

  snapshot.forEach((docSnap) => {
    const d = docSnap.data();
    const id = docSnap.id;

    total++;
    count.innerText = total;

    const row = table.insertRow();

    row.insertCell(0).innerText = d.department;
    row.insertCell(1).innerText = d.year;
    row.insertCell(2).innerText = d.name;
    row.insertCell(3).innerText = d.roll;
    row.insertCell(4).innerText = d.lecture;
    row.insertCell(5).innerHTML = `<img src="${d.photo}">`;
    row.insertCell(6).innerText = new Date(d.date).toLocaleString();

    const actionCell = row.insertCell(7);

    const btn = document.createElement("button");
    btn.innerText = "Delete";
    btn.classList.add("delete-btn");

    btn.onclick = async () => {
      if(confirm("⚠️ Are you sure you want to delete this record?")){
        await deleteDoc(doc(db, "attendance", id));
        row.remove();
        total--;
        count.innerText = total;
        alert("✅ Deleted Successfully");
      }
    };

    actionCell.appendChild(btn);
  });
}

loadData();

</script>

</body>
</html>
