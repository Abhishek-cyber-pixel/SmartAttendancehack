<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#eef2f7;
}

h2{
  text-align:center;
  padding:15px;
}

.container{
  width:95%;
  margin:auto;
  background:#fff;
  border-radius:12px;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

table{
  width:100%;
  border-collapse: collapse;
}

th{
  background:#4f46e5;
  color:white;
  padding:12px;
  position:sticky;
  top:0;
}

td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

tr:hover{
  background:#f9fafb;
}

img{
  width:60px;
  height:60px;
  border-radius:8px;
  object-fit:cover;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:2px;
}

.delete-btn{
  background:#ef4444;
  color:white;
}

.update-btn{
  background:#22c55e;
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

</style>

</head>

<body>

<h2>📊 Smart Attendance Admin Panel</h2>

<div class="container">

<div class="header">
  <div>Total Records: <span id="count">0</span></div>
</div>

<table id="table">
<tr>
<th>Dept</th>
<th>Year</th>
<th>Name</th>
<th>Roll</th>
<th>Lecture</th>
<th>Photo</th>
<th>Date</th>
<th>Action</th>
</tr>
</table>

</div>

<!-- Hidden camera -->
<video id="video" style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "smart-attendence-3167b.firebaseapp.com",
  projectId: "smart-attendence-3167b",
  storageBucket: "smart-attendence-3167b.appspot.com",
  messagingSenderId: "894029161535",
  appId: "1:894029161535:web:3e0749629d7389dc85048a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const table = document.getElementById("table");
const count = document.getElementById("count");

let total = 0;
let currentDocId = null;
let videoStream = null;

// LOAD DATA
async function loadData() {
  const snapshot = await getDocs(collection(db, "attendance"));

  snapshot.forEach((docSnap) => {
    const d = docSnap.data();
    const id = docSnap.id;

    total++;
    count.innerText = total;

    const row = table.insertRow();

    row.insertCell(0).innerText = d.department;
    row.insertCell(1).innerText = d.year;
    row.insertCell(2).innerText = d.name;
    row.insertCell(3).innerText = d.roll;
    row.insertCell(4).innerText = d.lecture;

    const imgCell = row.insertCell(5);
    imgCell.innerHTML = `<img src="${d.photo}">`;

    row.insertCell(6).innerText = new Date(d.date).toLocaleString();

    const actionCell = row.insertCell(7);

    // DELETE
    const delBtn = document.createElement("button");
    delBtn.innerText = "Delete";
    delBtn.classList.add("delete-btn");

    delBtn.onclick = async () => {
      if(confirm("Delete record?")){
        await deleteDoc(doc(db,"attendance",id));
        row.remove();
        total--;
        count.innerText = total;
      }
    };

    // UPDATE PHOTO
    const updateBtn = document.createElement("button");
    updateBtn.innerText = "Update Photo";
    updateBtn.classList.add("update-btn");

    updateBtn.onclick = async () => {
      currentDocId = id;
      openCamera();
    };

    actionCell.appendChild(updateBtn);
    actionCell.appendChild(delBtn);
  });
}

// CAMERA OPEN
async function openCamera(){
  const video = document.getElementById("video");
  video.style.display="block";

  videoStream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = videoStream;

  setTimeout(capturePhoto,2000); // auto capture after 2 sec
}

// CAPTURE + UPDATE
async function capturePhoto(){
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  const newPhoto = canvas.toDataURL("image/jpeg",0.6);

  // STOP CAMERA
  videoStream.getTracks().forEach(track=>track.stop());
  video.style.display="none";

  // UPDATE FIREBASE
  await updateDoc(doc(db,"attendance",currentDocId),{
    photo:newPhoto
  });

  alert("Photo Updated! Refresh page to see changes");
}

loadData();

</script>

</body>
</html>
